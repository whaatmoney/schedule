<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QPC Aging Signal v12 — 05/02/2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Segoe UI Web',Arial,sans-serif;background:#FAF9F8;color:#323130;-webkit-font-smoothing:antialiased;}
.mc{font-family:'Source Code Pro',monospace;}
.app{max-width:1320px;margin:0 auto;padding:16px 16px 32px;}
.hdr{display:flex;align-items:center;gap:14px;padding:14px 20px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px;flex-wrap:wrap;border:1px solid #EDEBE9;}
.hdr-title{font-size:17px;font-weight:700;color:#201F1E;letter-spacing:-.3px;}
.hdr-date{font-size:12px;color:#605E5C;font-weight:400;}
.hdr-gen{font-size:10px;color:#A19F9D;font-weight:400;margin-top:1px;}
.sep{width:1px;height:32px;background:#EDEBE9;}
.hs{text-align:center;padding:0 10px;}
.hs .v{font-size:22px;font-weight:700;line-height:1.1;}
.hs .l{font-size:10px;color:#8A8886;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;font-weight:600;}
.tier-hdr{font-size:10px;font-weight:700;letter-spacing:1.2px;padding:4px 10px;border-radius:6px;}

/* v9: Data-quality chip row */
.dq-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.dq-chip.ok{background:#F3F9F1;border-color:#107C1040;color:#0B6A0B;}
.tier-badge{display:inline-block;padding:1px 5px;background:#D1343818;color:#D13438;border:1px solid #D1343840;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:0.3px;margin-left:2px;vertical-align:middle;}
.dq-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border:1px solid #EDEBE9;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);font-size:12px;color:#605E5C;line-height:1.3;}
.dq-chip .dq-n{font-family:'Source Code Pro',monospace;font-size:18px;font-weight:700;}
.dq-chip .dq-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#8A8886;}
.dq-chip.warn{border-color:#F7D98B;background:#FFF4CE;}
.dq-chip.warn .dq-n{color:#7A6200;}
.dq-chip.warn .dq-l{color:#7A6200;}
.dq-chip.info{border-color:#DEECF9;background:#EFF6FC;}
.dq-chip.info .dq-n{color:#0078D4;}
.dq-chip.info .dq-l{color:#0078D4;}
.dq-chip.hold{border-color:#E0D0F0;background:#F0E6FA;}
.dq-chip.hold .dq-n{color:#8764B8;}
.dq-chip.hold .dq-l{color:#8764B8;}

.tabs{display:flex;gap:4px;margin-bottom:16px;}
.tab{flex:1;padding:10px 12px;text-align:center;font-size:13px;font-weight:600;color:#605E5C;cursor:pointer;border-radius:8px;transition:all .15s;background:#fff;border:1px solid #EDEBE9;user-select:none;}
.tab:hover{color:#201F1E;background:#F3F2F1;border-color:#D2D0CE;}
.tab.on{color:#0078D4;background:#EFF6FC;border-color:#0078D4;box-shadow:0 1px 4px rgba(0,120,212,.12);}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid #EDEBE9;overflow:hidden;}
table.t{width:100%;border-collapse:collapse;font-size:13px;}
table.t th{background:#FAFAFA;color:#605E5C;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:10px 12px;text-align:left;border-bottom:2px solid #EDEBE9;position:sticky;top:0;z-index:2;}
table.t th.r{text-align:right;}table.t th.c{text-align:center;}
table.t td{padding:10px 12px;border-bottom:1px solid #F3F2F1;}
table.t td.r{text-align:right;}table.t td.c{text-align:center;}
table.t tr.s0{background:#FFFFFF;}table.t tr.s1{background:#FAFAF9;}
table.t tr:hover{background:#F3F2F1!important;}
table.t tr.cu{opacity:.6;}table.t tr.cu td{font-style:italic;}
.dr{cursor:pointer;transition:background .12s;}
.dr td:first-child{padding-left:16px;}
.dn{font-weight:700;font-size:14px;color:#201F1E;}
.dl{font-size:11px;color:#8A8886;font-weight:500;}
.da{font-size:22px;font-weight:700;line-height:1;}
.db{width:100%;height:6px;background:#F3F2F1;border-radius:4px;overflow:hidden;min-width:80px;}
.dbf{height:100%;border-radius:4px;transition:width .5s;}
.fc{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px;margin:1px 3px;white-space:nowrap;}
.tl{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:6px;}
.oc{font-size:10px;font-weight:700;letter-spacing:.6px;padding:3px 8px;border-radius:6px;}
.cc{font-size:9px;font-weight:700;letter-spacing:.8px;padding:2px 6px;border-radius:4px;background:#F0E6FA;color:#8764B8;border:1px solid #E0D0F0;vertical-align:middle;margin-left:6px;}
.gd{background:#FAFAF9;padding:16px 20px 16px 24px;animation:fi .15s ease;border-top:1px solid #F3F2F1;}
.gs{margin-bottom:12px;}.gs:last-child{margin-bottom:0;}
.gl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#8A8886;margin-bottom:4px;}
.gt{font-size:13px;color:#605E5C;line-height:1.65;}
.ob{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;margin-top:8px;}
.ub{margin-top:10px;padding:10px 12px;border-radius:8px;background:#EFF6FC;border:1px solid #DEECF9;}
.ub-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:#0078D4;margin-bottom:3px;text-transform:uppercase;}
.ub-text{font-size:12px;color:#0078D4;line-height:1.55;opacity:.85;}
@keyframes fi{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.sl{padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8A8886;background:#F3F2F1;border-bottom:1px solid #EDEBE9;border-top:1px solid #EDEBE9;}
.gw{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid #EDEBE9;padding:20px;margin-bottom:14px;}
.gt2{display:flex;align-items:center;gap:20px;margin-bottom:12px;flex-wrap:wrap;}
.gp{font-size:44px;font-weight:700;line-height:1;}
.gi-t{font-size:15px;font-weight:600;color:#201F1E;}
.gi-s{font-size:12px;color:#605E5C;}
.gb{height:8px;background:#F3F2F1;border-radius:5px;position:relative;overflow:visible;}
.gbf{height:100%;border-radius:5px;transition:width .5s;}
.gm{position:absolute;top:-5px;height:18px;width:2px;border-radius:1px;}
.gbl{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:#8A8886;}
.wb{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.55;}
.ru{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid #EDEBE9;padding:16px 20px;margin-bottom:14px;}
.ru h3{font-size:13px;font-weight:700;color:#201F1E;margin-bottom:6px;}
.ru p{font-size:12px;color:#605E5C;line-height:1.6;}
.fl{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.fb{font-size:11px;padding:5px 12px;border-radius:16px;border:1px solid #D2D0CE;background:#fff;color:#605E5C;cursor:pointer;font-family:'Segoe UI',sans-serif;font-weight:600;transition:all .12s;}
.fb:hover{color:#201F1E;border-color:#8A8886;background:#F3F2F1;}
.fb.on{background:#EFF6FC;color:#0078D4;border-color:#0078D4;}
.sw{overflow-x:auto;max-height:480px;overflow-y:auto;}
.st{font-size:14px;font-weight:700;color:#201F1E;margin:16px 0 10px;}
.nt{font-size:10px;color:#8A8886;margin-top:6px;padding:0 4px;}
.biz-note{font-size:10px;color:#8A8886;padding:6px 12px;text-align:right;}
.tab-content{display:none;}.tab-content.active{display:block;}

/* v9: profile pill + margin bar */
.prof-pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:#F3F2F1;color:#605E5C;border:1px solid #EDEBE9;letter-spacing:.2px;}
.prof-pill.unc{background:#FDE7E9;color:#A4262C;border-color:#F1BBBC;}
.prof-pill.prov{background:#F0E6FA;color:#8764B8;border-color:#E0D0F0;}
.margin-bar{position:relative;height:8px;width:90px;background:#F3F2F1;border-radius:4px;overflow:hidden;}
.margin-bar .mbf{position:absolute;top:0;left:0;height:100%;border-radius:4px;transition:width .5s;}
.margin-cell{display:flex;align-items:center;gap:8px;}
.margin-num{font-family:'Source Code Pro',monospace;font-size:11px;font-weight:700;min-width:36px;text-align:right;}

/* ─── SIGNAL LEGEND ─── */
.legend-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 14px;background:#fff;border:1px solid #EDEBE9;border-radius:10px;margin-bottom:12px;user-select:none;transition:all .15s;}
.legend-toggle:hover{background:#F3F2F1;border-color:#D2D0CE;}
.legend-toggle .chevron{font-size:10px;color:#8A8886;transition:transform .2s;display:inline-block;}
.legend-toggle .chevron.open{transform:rotate(90deg);}
.legend-toggle .ltitle{font-size:11px;font-weight:700;color:#605E5C;letter-spacing:.4px;text-transform:uppercase;}
.legend-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;margin-left:8px;}
.legend-chip{font-size:10px;font-weight:700;padding:2px 10px;border-radius:10px;letter-spacing:.3px;}
.legend-panel{overflow:hidden;max-height:0;transition:max-height .3s ease;background:#fff;border:1px solid #EDEBE9;border-radius:12px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.legend-panel.open{max-height:1400px;}
.legend-inner{padding:20px;}
.legend-section{margin-bottom:20px;}.legend-section:last-child{margin-bottom:0;}
.legend-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8A8886;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #F3F2F1;}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.legend-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;background:#FAFAF9;border:1px solid #F3F2F1;transition:background .12s;}
.legend-item:hover{background:#F3F2F1;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.legend-bar{width:4px;height:100%;min-height:32px;border-radius:2px;flex-shrink:0;}
.legend-name{font-size:12px;font-weight:700;color:#201F1E;margin-bottom:2px;}
.legend-desc{font-size:11px;color:#605E5C;line-height:1.5;}
.legend-profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;}
.legend-profile-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;background:#FAFAF9;border:1px solid #F3F2F1;}
.legend-profile-name{font-size:12px;font-weight:600;color:#201F1E;}
.legend-profile-range{font-family:'Source Code Pro',monospace;font-size:11px;font-weight:700;color:#0078D4;}
.legend-profile-range.prov{color:#8764B8;}

/* ─── PRODUCTION FLOW VIZ ─── */
.flow-wrap{padding:4px 0;}
.flow-pipeline{display:flex;align-items:stretch;gap:0;margin:16px 0;position:relative;overflow-x:auto;padding:8px 0;}
.flow-node{flex:1;min-width:130px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;}
.flow-box{width:100%;padding:14px 10px;border-radius:12px;text-align:center;border:2px solid;position:relative;background:#fff;transition:transform .15s,box-shadow .15s;}
.flow-box:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1);}
.flow-dept{font-size:11px;font-weight:700;color:#201F1E;margin-bottom:4px;line-height:1.2;}
.flow-lead{font-size:9px;color:#8A8886;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.flow-ar{font-size:22px;font-weight:800;line-height:1;margin-bottom:2px;}
.flow-ratio{font-size:9px;color:#8A8886;margin-bottom:6px;}
.flow-flags{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;}
.flow-flag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;}
.flow-incoming{font-size:9px;font-weight:700;color:#0078D4;letter-spacing:.3px;margin-top:5px;padding:2px 7px;border-radius:8px;background:#EFF6FC;border:1px solid #DEECF9;}
.flow-profile-mix{margin-top:6px;display:flex;flex-direction:column;gap:2px;font-size:8px;line-height:1.3;}
.flow-profile-mix-row{display:flex;justify-content:space-between;align-items:center;gap:4px;color:#605E5C;}
.flow-profile-mix-row .pfn{font-weight:600;}
.flow-profile-mix-row .pfc{font-family:'Source Code Pro',monospace;color:#8A8886;}
.flow-arrow{display:flex;align-items:center;justify-content:center;min-width:36px;position:relative;z-index:0;}
.flow-arrow svg{display:block;}
.flow-arrow-thick{min-width:40px;}
.flow-arrow-thick svg{width:40px;height:30px;}
.flow-bottleneck-ring{position:absolute;inset:-4px;border-radius:14px;border:2px dashed;animation:pulse-ring 1.5s ease-in-out infinite;pointer-events:none;}
@keyframes pulse-ring{0%,100%{opacity:.4;}50%{opacity:1;}}

/* ─── v11: CLICKABLE KPIs + MODAL ─── */
.hs.clickable, .dq-chip.clickable { cursor: pointer; position: relative; transition: background .15s, box-shadow .15s, transform .12s; }
.hs.clickable{border-radius:8px; padding:6px 10px;}
.hs.clickable:hover { background: #F3F2F1; }
.hs.clickable:focus-visible { outline: 2px solid #0078D4; outline-offset: 2px; }
.hs.clickable::after { content: ""; position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; border-right: 1.5px solid #C8C6C4; border-top: 1.5px solid #C8C6C4; transform: rotate(45deg); opacity: 0; transition: opacity .15s; }
.hs.clickable:hover::after { opacity: 1; }
.dq-chip.clickable:hover { box-shadow: 0 3px 10px rgba(0,0,0,.08); transform: translateY(-1px); }
.dq-chip.clickable:focus-visible { outline: 2px solid #0078D4; outline-offset: 2px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(50,49,48,.55); z-index: 1000; display: none; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; backdrop-filter: blur(2px); }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; width: 100%; max-width: 1100px; box-shadow: 0 12px 40px rgba(0,0,0,.25); border: 1px solid #EDEBE9; overflow: hidden; animation: modalIn .18s ease; }
@keyframes modalIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.modal-hdr { display: flex; align-items: center; gap: 12px; padding: 14px 20px; background: #FAFAF9; border-bottom: 1px solid #EDEBE9; flex-wrap: wrap; }
.modal-title { font-size: 15px; font-weight: 700; color: #201F1E; flex-grow: 1; letter-spacing: -.2px; }
.modal-count { font-family: 'Source Code Pro', monospace; font-size: 11px; color: #605E5C; font-weight: 600; background: #F3F2F1; padding: 3px 10px; border-radius: 10px; }
.modal-close { background: transparent; border: none; font-size: 18px; color: #8A8886; cursor: pointer; padding: 4px 12px; border-radius: 6px; font-weight: 700; font-family: inherit; }
.modal-close:hover { background: #F3F2F1; color: #201F1E; }
.modal-controls { display: flex; gap: 14px; padding: 10px 20px; border-bottom: 1px solid #EDEBE9; align-items: center; flex-wrap: wrap; background: #fff; }
.modal-ctrl-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #8A8886; }
.modal-ctrl-sel { padding: 6px 28px 6px 10px; border: 1px solid #D2D0CE; border-radius: 6px; background: #fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23605E5C' stroke-width='1.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") no-repeat right 10px center; font-size: 12px; font-family: 'Segoe UI', sans-serif; color: #323130; cursor: pointer; appearance: none; -webkit-appearance: none; min-width: 180px; }
.modal-ctrl-sel:hover { border-color: #8A8886; }
.modal-ctrl-sel:focus { outline: 2px solid #0078D4; outline-offset: -1px; border-color: #0078D4; }
.modal-body { max-height: 65vh; overflow-y: auto; }
.modal-empty { padding: 40px 20px; text-align: center; color: #8A8886; font-size: 13px; }
.modal-foot { padding: 9px 20px; border-top: 1px solid #EDEBE9; background: #FAFAF9; font-size: 10px; color: #8A8886; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.modal-body table.t { font-size: 12.5px; }
.modal-body table.t th { position: sticky; top: 0; z-index: 3; }
.modal-body .status-pill { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.modal-body .status-short { background: #FDE7E9; color: #A4262C; border: 1px solid #F1BBBC; }
.modal-body .status-upcoming { background: #EFF6FC; color: #0078D4; border: 1px solid #DEECF9; }
.modal-body .status-complete { background: #FFF4CE; color: #7A6200; border: 1px solid #F7D98B; }
.modal-body .status-aging { background: #FDE7E9; color: #A4262C; border: 1px solid #F1BBBC; }
.modal-body .status-none { color: #8A8886; font-style: italic; font-size: 11px; }
.flow-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#8A8886;text-align:center;padding:4px 0 8px;width:100%;}
.flow-separator{display:flex;align-items:center;justify-content:center;min-width:2px;padding:0 4px;}
.flow-separator-line{width:1px;height:60%;background:#EDEBE9;}
.flow-customer-badge{font-size:8px;font-weight:700;letter-spacing:.6px;padding:2px 6px;border-radius:4px;background:#F0E6FA;color:#8764B8;border:1px solid #E0D0F0;margin-top:4px;}
.flow-metric-strip{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0;padding:14px 16px;background:#fff;border-radius:10px;border:1px solid #EDEBE9;}
.flow-metric{text-align:center;flex:1;min-width:100px;}
.flow-metric-val{font-size:18px;font-weight:700;line-height:1.2;}
.flow-metric-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#8A8886;margin-top:2px;}
.flow-bottleneck-callout{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:10px;margin-top:10px;border:1px solid;}
.flow-callout-icon{font-size:20px;flex-shrink:0;}
.flow-callout-text{font-size:12px;line-height:1.55;flex:1;}
.flow-callout-title{font-weight:700;margin-bottom:2px;}
.flow-callout-mix{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;}
.flow-callout-mix .pchip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:#fff;border:1px solid #EDEBE9;color:#605E5C;}
.flow-callout-mix .pchip.tight{background:#FDE7E9;color:#A4262C;border-color:#F1BBBC;}
.flow-callout-mix .pchip.long{background:#DFF6DD;color:#0B6A0B;border-color:#B5E9B1;}
.flow-callout-mix .pchip.unc{background:#FFF4CE;color:#7A6200;border-color:#F7D98B;}

/* ═══ RESCHEDULE STATUS v12 (decision-first) ═══ */
.rs-ontime-hero{display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;padding:20px 24px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:12px;}
.rs-ontime-hero.ok{background:linear-gradient(135deg,#F3F9F1 0%,#fff 70%);border:1px solid #B5E9B1;}
.rs-ontime-hero.warn{background:linear-gradient(135deg,#FFFBF0 0%,#fff 70%);border:1px solid #F7D98B;}
.rs-ontime-fig{display:flex;align-items:baseline;gap:10px;}
.rs-ontime-num{font-family:'Source Code Pro',monospace;font-size:48px;font-weight:700;line-height:1;}
.rs-ontime-divider{font-family:'Source Code Pro',monospace;font-size:24px;color:#8A8886;font-weight:700;line-height:1.2;}
.rs-ontime-denom{font-family:'Source Code Pro',monospace;font-size:24px;font-weight:700;line-height:1.2;color:#605E5C;}
.rs-ontime-meta{display:flex;flex-direction:column;gap:4px;}
.rs-ontime-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.rs-ontime-pct{font-size:24px;font-weight:700;line-height:1.2;}
.rs-ontime-context{font-size:11.5px;color:#605E5C;line-height:1.5;}
.rs-ontime-context strong{color:#201F1E;}
.rs-target-band{position:relative;height:32px;background:#F3F2F1;border-radius:8px;overflow:hidden;border:1px solid #EDEBE9;min-width:200px;}
.rs-target-band-zone{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,rgba(16,124,16,.18) 0%,rgba(16,124,16,.32) 100%);border-left:2px dashed #107C10;}

// ─── HELPERS ───
function getTier(ar) {
  if (ar <= 12) return { tier: "GREEN", color: "#107C10" };
  if (ar <= 20) return { tier: "YELLOW", color: "#C19C00" };
  if (ar <= 35) return { tier: "RED", color: "#D13438" };
  return { tier: "BLACK", color: "#323130" };
}
function esc(s) { return s == null ? "\u2014" : String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function msBDColor(v) { return v != null && v < 0 ? "#D13438" : v != null && v <= 0 ? "#CA5010" : "#8A8886"; }
function dueBDColor(v) { return v != null && v < 0 ? "#D13438" : v != null && v <= 2 ? "#CA5010" : "#8A8886"; }
function prioStyle(p) {
  if (p === "Tier 1 Expedite" || p === "Hot Expedite") return "color:#D13438;font-weight:700";
  if (p === "Tier 2 Expedite") return "color:#CA5010;font-weight:700";
  if (p === "Tier 3 Expedite" || p === "Expedite") return "color:#C19C00;font-weight:600";
  return "color:#8A8886";
}

// Profile margin cell. Renders profile bar + (when tier present) tier bar side-by-side.
function profileMarginCell(j) {
  const hasTier = j.expediteTier != null;
  // Helper: one bar+label for a given burn pct + over-days
  function renderBar(pct, over, labelPrefix) {
    if (pct == null) return "";
    const width = Math.max(4, Math.min(100, pct));
    let color = "#107C10";
    if (pct >= 100) color = "#D13438";
    else if (pct >= 80) color = "#CA5010";
    else if (pct >= 60) color = "#C19C00";
    const overTxt = (over != null && over > 0)
      ? `<span style="color:#D13438;font-weight:700;font-size:10px">+${over}d</span>`
      : "";
    const prefix = labelPrefix
      ? `<span style="color:#8A8886;font-size:9px;font-weight:600;margin-right:2px">${labelPrefix}</span>`
      : "";
    return `<div class="margin-cell" style="margin-bottom:${labelPrefix?'2px':'0'}">
      ${prefix}
      <div class="margin-bar"><div class="mbf" style="width:${width}%;background:${color}"></div></div>
      <span class="margin-num" style="color:${color}">${pct}%</span>
      ${overTxt}
    </div>`;
  }
  if (j.isUnclassified && !hasTier) {
    return `<span class="prof-pill unc" title="Unclassified — assign profile to unlock urgency scoring">Unclassified</span>`;
  }
  if (j.isProvisional && !hasTier) {
    return `<span class="prof-pill prov" title="Source/DCMA — provisional target">Provisional</span>`;
  }
  // Tier present — render tier bar first (primary commitment), profile second (reference).
  if (hasTier) {
    const tierShort = j.expediteTier.replace('Tier ', 'T').replace(' Expedite', '');
    let out = renderBar(j.tierBurnPct, j.tierOverBD, tierShort);
    if (j.profileBurnPct != null) {
      out += renderBar(j.profileBurnPct, j.profileOverBD, 'PRF');
    }
    return out || `<span style="color:#8A8886;font-size:10px">—</span>`;
  }
  // Standard case: just profile.
  if (j.profileBurnPct == null) {
    return `<span style="color:#8A8886;font-size:10px">—</span>`;
  }
  return renderBar(j.profileBurnPct, j.profileOverBD, null);
}

function profilePill(j) {
  const tierBadge = (j.expediteTier != null)
    ? ` <span class="tier-badge" title="Tier commitment overrides profile lead time (${j.tierMin}\u2013${j.tierMax} biz days)">${j.expediteTier.replace('Tier ', 'T').replace(' Expedite', '')}</span>`
    : "";
  if (!j.profile) {
    return `<span class="prof-pill unc" title="Unclassified">—</span>${tierBadge}`;
  }
  const cls = j.isProvisional ? "prov" : "";
  const rng = j.profileMin != null ? ` (${j.profileMin}\u2013${j.profileMax}d)` : "";
  return `<span class="prof-pill ${cls}" title="${esc(j.profile)}${rng}">${esc(j.profile)}</span>${tierBadge}`;
}

// ─── Data-Quality / Profile Chips ───
function buildDqRow() {
  const unclassAging = DATA.overall.unclassifiedAgingCount || 0;
  const unclassHouse = DATA.overall.unclassifiedInHouseCount || 0;
  const shortSched = DATA.overall.shortScheduledCount || 0;
  const custHold = DATA.overall.customerHoldProfileCount || 0;
  const completedCount = DATA.overall.completedCount || 0;
  const completedRatio = (DATA.overall.completedRatio != null ? DATA.overall.completedRatio : 0);
  const tierCount = DATA.overall.expediteTierCount || 0;
  const tierDist = DATA.overall.expediteTierDistribution || [];
  const tierMixHtml = tierDist.length
    ? ' <span style="color:#8A8886;font-weight:500;font-size:10px">(' +
      tierDist.map(t => `${t.tier.replace('Tier ', 'T').replace(' Expedite', '')}:${t.count}`).join(' ') +
      ')</span>'
    : '';
  const unclassClass = unclassAging > 0 ? "warn" : "info";
  const shortClass = shortSched > 0 ? "warn" : "info";
  // CR > 15% = workflow-bottleneck alarm; 8-15% = watch; <8% = ok
  const crClass = completedRatio > 15 ? "warn" : (completedRatio >= 8 ? "info" : "ok");
  // Tier chip: zero = ok (dormant), any > 0 = info (active)
  const tierClass = tierCount > 0 ? "info" : "ok";
  // Every DQ chip is clickable — same drill-down behavior as header tiles.
  const chip = (kpi, cls, inner, title) =>
    `<div class="dq-chip clickable ${cls}" role="button" tabindex="0" data-kpi="${kpi}" title="${esc(title)}" onclick="openKpiModal('${kpi}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openKpiModal('${kpi}');}">${inner}</div>`;
  return `<div class="dq-row">
    ${chip('unclass', unclassClass,
      `<span class="dq-n">${unclassAging}</span><span><div>Unclassified Aging</div><div class="dq-l">${unclassHouse} in-house total</div></span>`,
      "Jobs without a Job Profile can't be evaluated against expected lead time — click for the list")}
    ${chip('short', shortClass,
      `<span class="dq-n">${shortSched}</span><span><div>Short-Scheduled</div><div class="dq-l">under profile minimum</div></span>`,
      "In-house jobs where Received→Due is tighter than the profile's minimum window")}
    ${chip('custHold', 'hold',
      `<span class="dq-n">${custHold}</span><span><div>Customer Hold (Profile)</div><div class="dq-l">provisional targets</div></span>`,
      "Source Required / DCMA jobs — outside scheduling controls their dates")}
    ${chip('completed', crClass,
      `<span class="dq-n">${completedCount}</span><span><div>Completed Ratio <span style="color:#8A8886;font-weight:500">${completedRatio}%</span></div><div class="dq-l">finished at op, awaiting handoff</div></span>`,
      "Jobs marked 03 - Complete at their current location but not yet handed off to the next op")}
    ${chip('tier3', tierClass,
      `<span class="dq-n">${tierCount}</span><span><div>Tier Expedites${tierMixHtml}</div><div class="dq-l">override profile lead time</div></span>`,
      "Tiered expedite jobs (T1 = 1-3 biz days, T2 = 4-5, T3 = 6-7). Overrides profile lead time.")}
  </div>`;
}

function buildLegend() {

    { tier:"YELLOW", color:"#C19C00", range:"13–20%", meaning:"OTD at risk. Determine spike vs. trend." },
    { tier:"RED", color:"#D13438", range:"21–35%", meaning:"OTD failing. Clear exits, then address constraint." },
    { tier:"BLACK", color:"#323130", range:"> 35%", meaning:"System failure. Full reset needed." }
  ];
  const flagDefs = [
    { flag:"On Track", color:"#107C10", desc:"3+ biz days to milestone. Normal flow." },
    { flag:"Tight", color:"#C19C00", desc:"1–2 biz days to milestone. Front of queue — no room for delays." },
    { flag:"Reschedule Window", color:"#CA5010", desc:"1 biz day to milestone. Decision point: reschedule now or commit." },
    { flag:"Critical", color:"#D13438", desc:"≤ 0 biz days (milestone today or passed). Jumps every line." },
    { flag:"Past Due", color:"#8764B8", desc:"QPC Due Date has passed. This is an OTD miss." },
    { flag:"No Date", color:"#8A8886", desc:"Missing due date. Cannot enter signal system." }
  ];
  const tierChips = tierDefs.map(t =>
    `<span class="legend-chip" style="background:${t.color}14;color:${t.color};border:1px solid ${t.color}30">${t.tier}</span>`
  ).join("");
  const tierItems = tierDefs.map(t =>
    `<div class="legend-item"><div class="legend-dot" style="background:${t.color}"></div><div><div class="legend-name" style="color:${t.color}">${t.tier} <span style="font-weight:400;color:#8A8886;font-size:10px">${t.range}</span></div><div class="legend-desc">${t.meaning}</div></div></div>`
  ).join("");
  const flagItems = flagDefs.map(f =>
    `<div class="legend-item"><div style="width:4px;min-height:32px;border-radius:2px;flex-shrink:0;background:${f.color}"></div><div><div class="legend-name" style="color:${f.color}">${f.flag}</div><div class="legend-desc">${f.desc}</div></div></div>`
  ).join("");

  // Profile rules (v9)
  const rules = DATA.profileRules || {};
  const profileItems = Object.entries(rules).map(([name, v]) => {
    if (v.provisional) {
      return `<div class="legend-profile-item"><span class="legend-profile-name">${esc(name)}</span><span class="legend-profile-range prov">provisional</span></div>`;
    }
    return `<div class="legend-profile-item"><span class="legend-profile-name">${esc(name)}</span><span class="legend-profile-range">${v.min}\u2013${v.max}d</span></div>`;
  }).join("");

  return `
    <div class="legend-toggle" onclick="toggleLegend()">
      <span class="chevron" id="legend-chevron">▶</span>
      <span class="ltitle">Signal Legend</span>
      <div class="legend-chips">${tierChips}</div>
    </div>
    <div class="legend-panel" id="legend-panel">
      <div class="legend-inner">
        <div class="legend-section">
          <div class="legend-section-title">Department Signal Tiers (Aging Ratio)</div>
          <div class="legend-grid">${tierItems}</div>
        </div>
        <div class="legend-section">
          <div class="legend-section-title">Job Flags (Individual Work Orders)</div>
          <div class="legend-grid">${flagItems}</div>
        </div>
        <div class="legend-section">
          <div class="legend-section-title">Job Profiles — Expected Lead Time (Biz Days)</div>
          <div class="legend-profile-grid">${profileItems}</div>
          <div style="font-size:11px;color:#605E5C;line-height:1.6;margin-top:10px;max-width:800px;">
            Profiles describe the <strong>dominant burden</strong> of a job, not every attribute. A six-piece giant crate is <em>Large Parts</em>, not <em>Low Qty</em>. Source Required and DCMA have no firm internal lead time — their dates are provisional targets pending outside scheduling / witness activity. Profile margin fields (Burn %, Over, Slack) are derived from these windows.
          </div>
        </div>
        <div class="legend-section">
          <div class="legend-section-title">How Signals Work</div>
          <div style="font-size:12px;color:#605E5C;line-height:1.7;max-width:800px;">
            <strong style="color:#201F1E">Aging Ratio (AR)</strong> = aging jobs ÷ total in-house jobs per department. Each department gets a tier based on its AR. Individual jobs get flags based on how close they are to their milestone date (Start By) or due date. A <strong style="color:#D13438">burned reschedule</strong> escalates a job one tier higher — On Track becomes Tight, Tight becomes Reschedule Window, etc. The house AR across all departments sets the overall production signal. <strong style="color:#0078D4">Upcoming</strong> jobs are non-aging WOs whose Start By date is within 3 business days — shown as early warning context only. <strong style="color:#8764B8">Customer Hold (Profile)</strong> jobs — Source Required / DCMA — are pulled out of in-house AR math because their dates are provisional.
          </div>
        </div>
      </div>
    </div>`;
}

// ─── TAB 1: PRODUCTION FLOW ───
function buildProductionFlow() {
  const flowOrder = ["Receiving/Inspection","Pre-Clean","Cleanroom","Packaging","Shipping"];
  const sideOrder = ["Lab Testing","Assembly","Source","Customer Hold (Profile)"];
  const deptMap = {};
  DATA.departments.forEach(d => deptMap[d.name] = d);

  const bottlenecks = flowOrder
    .filter(n => deptMap[n] && deptMap[n].aging > 0)
    .sort((a, b) => deptMap[b].ar - deptMap[a].ar)
    .slice(0, 2);

  function profileMixRows(mix, limit) {
    if (!mix || !mix.length) return "";
    return mix.slice(0, limit).map(m => {
      const clr = TIGHT_PROFILES.has(m.name) ? "#A4262C" : LONG_PROFILES.has(m.name) ? "#0B6A0B" : (m.name==="(Unclassified)"?"#7A6200":"#605E5C");
      return `<div class="flow-profile-mix-row"><span class="pfn" style="color:${clr}">${esc(m.name)}</span><span class="pfc">${m.count}</span></div>`;
    }).join("");
  }

  function flowNode(name) {
    const d = deptMap[name];
    if (!d) return "";
    const {tier, color} = getTier(d.ar);
    const isBottleneck = bottlenecks.includes(name);
    const flags = FLAG_ORDER.filter(f => d.flags[f]).map(f =>
      `<span class="flow-flag" style="background:${FLAG_COLORS[f]}18;color:${FLAG_COLORS[f]}">${d.flags[f]} ${f.replace("Reschedule Window","RW")}</span>`
    ).join("");
    const shortName = name === "Receiving/Inspection" ? "RI" : name;
    const incomingBadge = (d.incoming && d.incoming > 0)
      ? `<div class="flow-incoming">\u2191 ${d.incoming} upcoming</div>`
      : "";
    const mix = d.aging > 0 ? `<div class="flow-profile-mix">${profileMixRows(d.profileMix, 3)}</div>` : "";
    return `<div class="flow-node">
      <div class="flow-box" style="border-color:${color};background:${color}06">
        ${isBottleneck ? `<div class="flow-bottleneck-ring" style="border-color:${color}"></div>` : ""}
        <div class="flow-dept">${shortName}</div>
        <div class="flow-lead">${d.lead}</div>
        <div class="flow-ar mc" style="color:${color}">${d.ar}%</div>
        <div class="flow-ratio">${d.aging} aging / ${d.total} total</div>
        <div class="flow-flags">${flags || '<span style="font-size:9px;color:#A19F9D">No aging</span>'}</div>
        ${mix}
        ${incomingBadge}
        ${isBottleneck ? `<div style="margin-top:6px;font-size:8px;font-weight:700;letter-spacing:.8px;color:${color};text-transform:uppercase">⚠ Bottleneck</div>` : ""}
      </div>
    </div>`;
  }

  function flowArrow(fromName, toName) {
    const from = deptMap[fromName];
    const to = deptMap[toName];
    const isToBneck = bottlenecks.includes(toName);
    const isFromBneck = bottlenecks.includes(fromName);
    const {color} = isToBneck ? getTier(to.ar) : isFromBneck ? getTier(from.ar) : {color:"#D2D0CE"};
    const thick = isToBneck || isFromBneck;
    const strokeW = thick ? 3 : 1.5;
    const opacity = thick ? 1 : 0.5;
    return `<div class="flow-arrow${thick ? ' flow-arrow-thick' : ''}">
      <svg width="${thick?40:32}" height="${thick?30:24}" viewBox="0 0 40 24" fill="none" style="opacity:${opacity}">
        <path d="M4 12H30" stroke="${color}" stroke-width="${strokeW}" stroke-linecap="round"/>
        <path d="M26 6L34 12L26 18" stroke="${color}" stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>`;
  }

  let pipeline = "";
  flowOrder.forEach((name, i) => {
    pipeline += flowNode(name);
    if (i < flowOrder.length - 1) pipeline += flowArrow(name, flowOrder[i + 1]);
  });

  const sideNodes = sideOrder.map(name => {
    const d = deptMap[name];
    if (!d) return "";
    const {tier, color} = getTier(d.ar);
    const flags = FLAG_ORDER.filter(f => d.flags[f]).map(f =>
      `<span class="flow-flag" style="background:${FLAG_COLORS[f]}18;color:${FLAG_COLORS[f]}">${d.flags[f]} ${f.replace("Reschedule Window","RW")}</span>`
    ).join("");
    const mix = d.aging > 0 ? `<div class="flow-profile-mix">${profileMixRows(d.profileMix, 3)}</div>` : "";
    const custBadge = d.isCustomerDep ? '<div class="flow-customer-badge">CUSTOMER HOLD</div>' : "";
    const provBadge = name === "Customer Hold (Profile)"
      ? '<div class="flow-customer-badge" style="background:#F0E6FA;color:#8764B8;border-color:#E0D0F0">PROVISIONAL / SRC+DCMA</div>'
      : "";
    return `<div class="flow-node" style="min-width:130px;max-width:180px;">
      <div class="flow-box" style="border-color:${color};background:${color}06;opacity:${d.isCustomerDep?.8:1}">
        <div class="flow-dept">${name === "Customer Hold (Profile)" ? "Customer Hold" : name}</div>
        <div class="flow-lead">${d.lead}</div>
        <div class="flow-ar mc" style="color:${color}">${d.ar}%</div>
        <div class="flow-ratio">${d.aging} aging / ${d.total} total</div>
        <div class="flow-flags">${flags || '<span style="font-size:9px;color:#A19F9D">No aging</span>'}</div>
        ${mix}
        ${provBadge || custBadge}
      </div>
    </div>`;
  }).join('<div style="width:10px"></div>');

  const callouts = bottlenecks.map(name => {
    const d = deptMap[name];
    const {color} = getTier(d.ar);
    const critCount = d.flags["Critical"] || 0;
    const pdCount = d.flags["Past Due"] || 0;
    const idx = flowOrder.indexOf(name);
    const upstream = idx > 0 ? flowOrder[idx - 1] : null;
    const downstream = idx < flowOrder.length - 1 ? flowOrder[idx + 1] : null;
    const upD = upstream ? deptMap[upstream] : null;
    const downD = downstream ? deptMap[downstream] : null;

    let impactText = `<strong>${d.aging} aging jobs</strong> (${critCount} Critical${pdCount ? ", " + pdCount + " Past Due" : ""}).`;
    if (d.incoming > 0) impactText += ` <strong>${d.incoming} upcoming jobs</strong> approaching Start By — additional pressure incoming.`;
    if (upD) impactText += ` Upstream: ${upstream} has ${upD.aging} aging${upD.incoming ? ", " + upD.incoming + " upcoming" : ""} — ${upD.aging === 0 ? "clear, no additional pressure" : "adding to the queue"}.`;
    if (downD) impactText += ` Downstream: ${downstream} has ${downD.aging} aging — ${downD.aging === 0 ? "clear and waiting" : "also under pressure"}.`;

    // Profile mix chips
    const mixChips = (d.profileMix || []).slice(0, 6).map(m => {
      const cls = TIGHT_PROFILES.has(m.name) ? "tight" : LONG_PROFILES.has(m.name) ? "long" : (m.name==="(Unclassified)"?"unc":"");
      return `<span class="pchip ${cls}">${esc(m.name)} ${m.count}</span>`;
    }).join("");

    return `<div class="flow-bottleneck-callout" style="background:${color}08;border-color:${color}30">
      <div class="flow-callout-icon">⚠️</div>
      <div class="flow-callout-text">
        <div class="flow-callout-title" style="color:${color}">${name} — ${getTier(d.ar).tier} (${d.ar}% AR)</div>
        <div style="color:#605E5C">${impactText}</div>
        ${mixChips ? `<div class="flow-callout-mix">${mixChips}</div>` : ""}
      </div>
    </div>`;
  }).join("");

  const totalAging = DATA.overall.agingJobs;
  const {tier, color} = getTier(DATA.overall.ar);
  const critTotal = DATA.overall.flagDist["Critical"] || 0;
  const pdTotal = DATA.overall.flagDist["Past Due"] || 0;
  const flowAging = flowOrder.reduce((s, n) => s + (deptMap[n]?.aging || 0), 0);
  const custAging = sideOrder.reduce((s, n) => s + (deptMap[n]?.aging || 0), 0);
  const totalUpcoming = DATA.overall.upcomingCount || 0;

  return `<div class="flow-wrap">
    <div class="flow-metric-strip">
      <div class="flow-metric"><div class="flow-metric-val mc" style="color:${color}">${DATA.overall.ar}%</div><div class="flow-metric-lbl">House AR</div></div>
      <div class="flow-metric"><div class="flow-metric-val mc" style="color:${color}">${totalAging}</div><div class="flow-metric-lbl">Total Aging</div></div>
      <div class="flow-metric"><div class="flow-metric-val mc" style="color:#D13438">${critTotal}</div><div class="flow-metric-lbl">Critical</div></div>
      <div class="flow-metric"><div class="flow-metric-val mc" style="color:#8764B8">${pdTotal}</div><div class="flow-metric-lbl">Past Due</div></div>
      <div class="flow-metric"><div class="flow-metric-val mc" style="color:#323130">${flowAging}</div><div class="flow-metric-lbl">Production Line</div></div>
      <div class="flow-metric"><div class="flow-metric-val mc" style="color:#8764B8">${custAging}</div><div class="flow-metric-lbl">Customer Hold</div></div>
      <div class="flow-metric"><div class="flow-metric-val mc" style="color:#0078D4">${totalUpcoming}</div><div class="flow-metric-lbl">Upcoming</div></div>
    </div>

    <div class="flow-section-label">Production Line — Upstream → Downstream</div>
    <div class="flow-pipeline">${pipeline}</div>

    <div class="flow-section-label" style="margin-top:16px">Off-Line Departments (Lab / Customer Holds)</div>
    <div style="display:flex;gap:10px;justify-content:center;margin:8px 0 16px;flex-wrap:wrap;">${sideNodes}</div>

    ${callouts ? `<div class="flow-section-label" style="margin-top:10px">Bottleneck Analysis</div>${callouts}` : ""}

    <div class="biz-note" style="margin-top:12px">Production flows left → right. Dashed rings = bottleneck. Arrow weight reflects pressure. Blue badges = upcoming (non-aging) jobs approaching Start By. Profile mix chips: <span style="color:#A4262C">red</span> = tight-window profiles (hardest to recover), <span style="color:#0B6A0B">green</span> = long-window profiles, <span style="color:#7A6200">amber</span> = unclassified (can't evaluate).</div>
  </div>`;
}
