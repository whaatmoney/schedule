function buildDeptSignals() {
  const main = DATA.departments.filter(d => !d.isBottom);
  const bottom = DATA.departments.filter(d => d.isBottom);

  function renderRows(depts, offset) {
    return depts.map((d, i) => {
      const idx = i + offset;
      const { tier, color } = getTier(d.ar);
      const g = GUIDANCE[d.name] || { what:"", action:"", ot:"assess", otText:"", upstream:null };
      const z = idx % 2 === 0 ? "s0" : "s1";
      const otBg = g.ot === "recommended" ? "#FFF4CE" : g.ot === "n/a" ? "#F3F2F1" : "#DFF6DD";
      const otBd = g.ot === "recommended" ? "#C19C00" : g.ot === "n/a" ? "#D2D0CE" : "#107C10";
      const otC = g.ot === "recommended" ? "#7A6200" : g.ot === "n/a" ? "#8A8886" : "#0B6A0B";
      const otL = g.ot === "recommended" ? "OT REC" : g.ot === "n/a" ? "N/A" : "NO OT";
      const flags = FLAG_ORDER.filter(f => d.flags[f]).map(f =>
        `<span class="fc" style="background:${FLAG_COLORS[f]}14;color:${FLAG_COLORS[f]}">${d.flags[f]} ${f}</span>`
      ).join("");
      const custTag = d.isCustomerDep ? '<span class="cc">CUST</span>' : '';
      const cuClass = d.isCustomerDep ? " cu" : "";
      const incomingCell = (d.incoming && d.incoming > 0)
        ? `<span style="color:#0078D4;font-weight:700;font-size:13px" class="mc">${d.incoming}</span>`
        : `<span style="color:#EDEBE9">—</span>`;
      // Completed-but-not-moved: jobs finished at this op, still physically sitting here.
      // Color scales with ratio — handoff-friction signal.
      const cc = d.completedCount || 0;
      const cr = d.completedRatio != null ? d.completedRatio : 0;
      const crColor = cr > 20 ? "#D13438" : cr > 10 ? "#C19C00" : cr > 0 ? "#605E5C" : "#EDEBE9";
      const completeCell = cc > 0
        ? `<span class="mc" style="color:${crColor};font-weight:700;font-size:13px">${cc}</span><br><span style="color:#8A8886;font-size:10px" class="mc">${cr}%</span>`
        : `<span style="color:#EDEBE9">—</span>`;
      // Top profile cell — first non-unclassified
      let topProfileCell = '<span style="color:#EDEBE9">—</span>';
      if (d.profileMix && d.profileMix.length) {
        const top = d.profileMix[0];
        const cls = TIGHT_PROFILES.has(top.name) ? "#A4262C" : LONG_PROFILES.has(top.name) ? "#0B6A0B" : (top.name==="(Unclassified)"?"#7A6200":"#605E5C");
        topProfileCell = `<span style="color:${cls};font-weight:600;font-size:11px">${esc(top.name)}</span><br><span style="color:#8A8886;font-size:10px" class="mc">${top.count} jobs</span>`;
      }
      const deptId = d.name.replace(/[\s\/()]/g,'_');
      let html = `<tr class="dr ${z}${cuClass}" onclick="toggleGuidance('${d.name.replace(/'/g,"\\'")}')">
        <td style="border-left:4px solid ${color}"><span class="dn">${d.name === "Customer Hold (Profile)" ? "Customer Hold" : d.name}</span>${custTag}<br><span class="dl">${d.lead}</span></td>
        <td class="c"><span class="tl mc" style="background:${color}14;color:${color};border:1px solid ${color}40">${tier}</span></td>
        <td class="r"><span class="da mc" style="color:${color}">${d.ar}%</span></td>
        <td class="c mc" style="color:#323130;font-size:14px;font-weight:700">${d.aging}</td>
        <td class="c mc" style="color:#8A8886">${d.total}</td>
        <td class="c">${completeCell}</td>
        <td class="c">${incomingCell}</td>
        <td>${topProfileCell}</td>
        <td><div class="db"><div class="dbf" style="width:${Math.min(d.ar,50)/50*100}%;background:${color}"></div></div></td>
        <td>${flags}</td>
        <td class="c"><span class="oc" style="background:${otBg};color:${otC};border:1px solid ${otBd}30">${otL}</span></td>
      </tr>`;
      html += `<tr class="guidance-row" id="g-${deptId}" style="display:none">
        <td colspan="11" style="padding:0;border-left:4px solid ${color}">
          <div class="gd">
            <div class="gs"><div class="gl">Situation</div><div class="gt">${esc(g.what)}</div></div>
            <div class="gs"><div class="gl">Action</div><div class="gt">${esc(g.action)}</div></div>
            <div class="ob" style="background:${otBg};border:1px solid ${otBd}30">
              <span class="oc mc" style="background:${otC}18;color:${otC};border:1px solid ${otC}30;flex-shrink:0">${otL}</span>
              <span style="font-size:12px;color:#605E5C;line-height:1.5">${esc(g.otText)}</span>
            </div>
            ${g.upstream ? `<div class="ub"><div class="ub-label">Upstream Impact</div><div class="ub-text">${esc(g.upstream)}</div></div>` : ''}
          </div>
        </td>
      </tr>`;
      return html;
    }).join("");
  }

  return `<div class="card">
    <table class="t"><thead><tr>
      <th style="width:16%">Department</th><th class="c" style="width:7%">Signal</th><th class="r" style="width:6%">AR%</th>
      <th class="c" style="width:6%">Aging</th><th class="c" style="width:6%">Total</th>
      <th class="c" style="width:7%" title="Jobs marked 03 - Complete at this dept's location but not yet handed off — handoff-bottleneck signal">Complete</th>
      <th class="c" style="width:7%" title="Non-aging jobs with Start By within 3 biz days">Upcoming</th>
      <th style="width:10%" title="Most frequent profile among aging jobs">Top Profile</th>
      <th style="width:9%">Ratio</th>
      <th style="width:17%">Flags</th><th class="c" style="width:9%">OT</th>
    </tr></thead><tbody>
      ${renderRows(main, 0)}
      <tr><td colspan="11" class="sl">Lab Testing / Customer Holds</td></tr>
      ${renderRows(bottom, main.length)}
    </tbody></table>
    <div class="biz-note"><strong>Complete</strong> = jobs marked 03 - Complete at this dept's physical location but not yet moved to the next op (handoff-bottleneck signal — red &gt;20%, amber &gt;10%). <strong>Upcoming</strong> = non-aging jobs with Start By ≤ 3 biz days. <strong>Top Profile</strong> = dominant profile among aging jobs (tap row for full mix + guidance). <span style="color:#A4262C">Red</span> = tight-window profile, <span style="color:#0B6A0B">green</span> = long-window, <span style="color:#7A6200">amber</span> = unclassified.</div>
  </div>`;
}

// ─── TAB 2: JOB FLAGS ───
let deptFilter = "All";
let flagFilter = "All";
let profileFilter = "All";

function buildJobTable() {
  let jobs = DATA.allAgingJobs.slice();
  if (deptFilter !== "All") jobs = jobs.filter(j => j.dept === deptFilter);
  if (flagFilter !== "All") jobs = jobs.filter(j => j.flag === flagFilter);
  if (profileFilter !== "All") {
    if (profileFilter === "(Unclassified)") jobs = jobs.filter(j => j.isUnclassified);
    else jobs = jobs.filter(j => j.profile === profileFilter);
  }
  jobs.sort((a, b) => {
    const fi = FLAG_ORDER.indexOf(a.flag) - FLAG_ORDER.indexOf(b.flag);
    return fi !== 0 ? fi : ((a.msBD ?? 999) - (b.msBD ?? 999));
  });
  const rows = jobs.map((j, i) => {
    const fc = FLAG_COLORS[j.flag];
    const dc = getTier(DATA.departments.find(d => d.name === j.dept)?.ar || 0).color;
    const shortBadge = j.isShortScheduled
      ? `<span style="font-size:9px;font-weight:700;color:#A4262C;background:#FDE7E9;padding:1px 5px;border-radius:4px;margin-left:4px" title="Scheduled tighter than profile minimum">SHORT</span>`
      : "";
    return `<tr class="${i%2===0?'s0':'s1'}">
      <td style="border-left:3px solid ${fc};padding-left:12px"><span style="color:${fc};font-weight:700;font-size:11px">${j.flag}</span></td>
      <td class="mc" style="font-weight:700;color:#201F1E">${j.wo}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#323130">${esc(j.customer)}</td>
      <td style="color:${dc};font-weight:600">${j.dept}</td>
      <td>${profilePill(j)}${shortBadge}</td>
      <td>${profileMarginCell(j)}</td>
      <td class="r mc" style="color:#605E5C">${esc(j.dueDate)}</td>
      <td class="r mc" style="color:${msBDColor(j.msBD)};font-weight:700">${j.msBD ?? '\u2014'}</td>
      <td class="r mc" style="color:${dueBDColor(j.dueBD)};font-weight:700">${j.dueBD ?? '\u2014'}</td>
      <td style="${prioStyle(j.priority)}">${j.priority}</td>
      <td class="c">${j.rescheduled ? '<span style="color:#D13438;font-weight:700;font-size:10px">BURNED</span>' : '<span style="color:#EDEBE9">\u2014</span>'}</td>
    </tr>`;
  }).join("");
  setTimeout(() => {
    const el = document.getElementById("jobCount");
    if (el) el.textContent = `${jobs.length} jobs — Profile Margin bar: burn % of profile max (red = past profile window). Ms BD = biz days to dept milestone. Due BD = biz days to QPC Due Date.`;
  }, 0);
  return `<table class="t"><thead><tr><th>Flag</th><th>WO</th><th>Customer</th><th>Dept</th><th>Profile</th><th>Profile Margin</th><th class="r">Due</th><th class="r">Ms BD</th><th class="r">Due BD</th><th>Priority</th><th class="c">Resched</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function buildUpcomingTable() {
  let jobs = (DATA.upcomingJobs || []).slice();
  if (deptFilter !== "All") jobs = jobs.filter(j => j.dept === deptFilter);
  if (profileFilter !== "All") {
    if (profileFilter === "(Unclassified)") jobs = jobs.filter(j => !j.profile);
    else jobs = jobs.filter(j => j.profile === profileFilter);
  }
  if (jobs.length === 0) {
    return `<div style="padding:24px;text-align:center;color:#8A8886;font-size:13px">No upcoming jobs for the selected filter.</div>`;
  }
  const rows = jobs.map((j, i) => {
    const dc = getTier(DATA.departments.find(d => d.name === j.dept)?.ar || 0).color;
    const msBDC = j.msBD <= 0 ? "#D13438" : j.msBD === 1 ? "#CA5010" : "#0078D4";
    const msBDLabel = j.msBD <= 0 ? "START NOW" : j.msBD === 1 ? "TOMORROW" : `${j.msBD}d`;
    const prof = j.profile
      ? `<span class="prof-pill">${esc(j.profile)}</span>`
      : `<span class="prof-pill unc">—</span>`;
    return `<tr class="${i%2===0?'s0':'s1'}">
      <td class="mc" style="font-weight:700;color:#201F1E;border-left:3px solid #0078D4;padding-left:12px">${j.wo}</td>
      <td style="color:${dc};font-weight:600">${j.dept}</td>
      <td>${prof}</td>
      <td class="r mc" style="color:#605E5C">${esc(j.msDate || '\u2014')}</td>
      <td class="r mc" style="color:${msBDC};font-weight:700">${j.msBD ?? '\u2014'} <span style="font-size:9px;font-weight:700;letter-spacing:.5px;color:${msBDC}">${msBDLabel}</span></td>
      <td class="r mc" style="color:#605E5C">${esc(j.dueDate)}</td>
      <td class="r mc" style="color:${dueBDColor(j.dueBD)};font-weight:700">${j.dueBD ?? '\u2014'}</td>
      <td style="${prioStyle(j.priority)}">${esc(j.priority) || '\u2014'}</td>
    </tr>`;
  }).join("");
  return `<table class="t"><thead><tr>
    <th>WO</th><th>Dept</th><th>Profile</th><th class="r">Start By</th><th class="r">Ms BD</th><th class="r">Due</th><th class="r">Due BD</th><th>Priority</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function buildJobFlags() {
  let flagSummary = FLAG_ORDER.map((f, i) => {
    const ct = DATA.overall.flagDist[f] || 0;
    if (!ct) return "";
    return `<tr class="${i%2===0?'s0':'s1'}">
      <td style="border-left:4px solid ${FLAG_COLORS[f]};padding-left:16px"><span style="font-weight:700;font-size:14px;color:${FLAG_COLORS[f]}">${f}</span></td>
      <td class="c"><span class="mc" style="font-size:24px;font-weight:700;color:${FLAG_COLORS[f]}">${ct}</span></td>
      <td style="font-size:12px;color:#605E5C;line-height:1.55">${FLAG_DEFS[f]}</td>
    </tr>`;
  }).join("");

  let crossTab = DATA.departments.filter(d => d.aging > 0).map((d, i) => {
    const { color } = getTier(d.ar);
    const cuClass = d.isCustomerDep ? " cu" : "";
    const cells = FLAG_ORDER.map(f => {
      const v = d.flags[f] || 0;
      return `<td class="c mc" style="color:${v ? FLAG_COLORS[f] : '#EDEBE9'};font-weight:${v?700:400}">${v || '\u00b7'}</td>`;
    }).join("");
    return `<tr class="${i%2===0?'s0':'s1'}${cuClass}">
      <td style="border-left:4px solid ${color};padding-left:16px;font-weight:600">${d.name === "Customer Hold (Profile)" ? "Customer Hold" : d.name}${d.isCustomerDep?' \u2298':''}</td>
      ${cells}
      <td class="c mc" style="color:${color};font-weight:700">${d.aging}</td>
    </tr>`;
  }).join("");

  const deptBtns = ["All",...MENU_ORDER].map(d =>
    `<button class="fb${deptFilter===d?' on':''}" onclick="setDeptFilter('${d}')">${d==="All"?"All Depts":(d==="Customer Hold (Profile)"?"Cust Hold":d)}</button>`
  ).join("");
  const flagBtns = ["All",...FLAG_ORDER].map(f => {
    const c = f !== "All" ? FLAG_COLORS[f] : undefined;
    const style = flagFilter === f && c ? ` style="border-color:${c};color:${c}"` : "";
    return `<button class="fb${flagFilter===f?' on':''}"${style} onclick="setFlagFilter('${f.replace(/'/g,"\\'")}')"><span>${f==="All"?"All Flags":f}</span></button>`;
  }).join("");

  // Profile filter chips, built from PROFILE rules + (Unclassified)
  const profileNames = Object.keys(DATA.profileRules || {});
  const profileBtns = ["All", ...profileNames, "(Unclassified)"].map(p =>
    `<button class="fb${profileFilter===p?' on':''}" onclick="setProfileFilter('${p.replace(/'/g,"\\'")}')"><span>${p==="All"?"All Profiles":p}</span></button>`
  ).join("");

  const upcomingCount = DATA.overall.upcomingCount || 0;

  return `
    <div class="card" style="margin-bottom:16px">
      <table class="t"><thead><tr><th style="width:22%">Flag</th><th class="c" style="width:8%">Count</th><th>Rule</th></tr></thead>
      <tbody>${flagSummary}</tbody></table>
    </div>
    <div class="st">Flag \u00d7 Department</div>
    <div class="card" style="margin-bottom:16px">
      <table class="t" style="font-size:12px"><thead><tr>
        <th style="width:18%">Department</th>
        ${FLAG_ORDER.map(f => `<th class="c" style="color:${FLAG_COLORS[f]}">${f.replace("Reschedule Window","Resched")}</th>`).join("")}
        <th class="c">Total</th>
      </tr></thead><tbody>${crossTab}</tbody></table>
    </div>

    <div class="st">All Aging Jobs (${DATA.allAgingJobs.length})</div>
    <div class="fl">${deptBtns}</div>
    <div class="fl">${flagBtns}</div>
    <div class="fl">${profileBtns}</div>
    <div class="card sw" id="jobTableWrap">${buildJobTable()}</div>
    <div class="nt" id="jobCount"></div>

    <div class="st" style="margin-top:24px;display:flex;align-items:center;gap:12px">
      <span>Upcoming Jobs — Approaching Start By</span>
      <span style="font-size:11px;font-weight:400;color:#8A8886">${upcomingCount} non-aging WOs with milestone within 3 biz days</span>
    </div>
    <div style="background:#EFF6FC;border:1px solid #DEECF9;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#0078D4;line-height:1.55;">
      These jobs are <strong>not yet aging</strong> — they appear here because their department Start By date is within 3 business days. Use this list to get ahead of workload before it ages.
    </div>
    <div class="fl">${deptBtns}</div>
    <div class="fl">${profileBtns}</div>
    <div class="card sw" id="upcomingTableWrap">${buildUpcomingTable()}</div>
    <div class="biz-note">Ms BD = biz days to dept Start By. Due BD = biz days to QPC Due Date. Mon–Fri, 7:00a–3:30p</div>`;
}

function setDeptFilter(d) { deptFilter = d; document.getElementById("tab2").innerHTML = buildJobFlags(); }
function setFlagFilter(f) { flagFilter = f; document.getElementById("tab2").innerHTML = buildJobFlags(); }
function setProfileFilter(p) { profileFilter = p; document.getElementById("tab2").innerHTML = buildJobFlags(); }

// ─── TAB 3: RESCHEDULE STATUS (v12 — decision-first) ───
function buildReschedule() {
  const RS = DATA.rescheduleStatus || {};
  const { rescheduledCount, reschedulePct, totalInHouse } = DATA.reschedule || {};
  const buf_color = reschedulePct >= 20 ? "#D13438" : reschedulePct >= 15 ? "#C19C00" : "#107C10";

  const target = RS.kpiTarget || 98;
  const onTime = RS.onTimeCount ?? 0;
  const totalAssessed = RS.totalAssessed ?? 0;
  const onTimePct = RS.onTimePct ?? 100;
  const atRiskCount = RS.atRiskCount ?? 0;
  const decideToday = RS.decideToday || [];
  const decideWeek = RS.decideWeek || [];
  const notify = RS.notify || [];
  const monitor = RS.monitor || [];
  const escalate = RS.escalate || [];

  const above_kpi = onTimePct >= target;
  const hero_state = above_kpi ? "ok" : "warn";
  const hero_num_color = above_kpi ? "#0B6A0B" : "#7A6200";
  const marker_color = above_kpi ? "#0B6A0B" : "#C19C00";
  const recoverable = decideToday.length + decideWeek.length;
  const proj_after_action = totalAssessed > 0 ? Math.round(100.0 * (onTime + recoverable) / totalAssessed) : 100;
  const exception_total = decideToday.length + decideWeek.length + notify.length + escalate.length;

  const heroContext = above_kpi
    ? "At the <strong>" + target + "% OTD KPI</strong> measured against current QPC Due Date. <strong>" + atRiskCount + " forecast miss" + (atRiskCount===1?'':'es') + "</strong> in the sections below. The other " + onTime + " are forecast to land on or before their current QPC Due."
    : "<strong>" + (target - Math.floor(onTimePct)) + " point" + ((target - Math.floor(onTimePct))===1?'':'s') + " below the " + target + "% OTD KPI today.</strong> " + atRiskCount + " forecast miss" + (atRiskCount===1?'':'es') + ": " + notify.length + " in Notify (already burned, miss locked in)" + (recoverable>0?', '+recoverable+' in Decide today/week (recoverable by burning)':'') + ". " + (recoverable>0?"Burning the Decide jobs recovers the forecast to <strong>" + proj_after_action + "%</strong>.":'');

  const escHtml = (s) => esc(String(s == null ? '' : s));
  const profilePill = (p, tightFlag) => {
    if (!p) return '<span class="prof-pill unc">' + '—' + '</span>';
    const isTight = tightFlag || TIGHT_PROFILES.has(p);
    const isProv = (p === 'Source Required' || p === 'DCMA');
    if (isProv) return '<span class="prof-pill prov">' + escHtml(p) + '</span>';
    if (isTight) return '<span class="prof-pill" style="background:#FDE7E9;color:#A4262C;border-color:#F1BBBC">' + escHtml(p) + '</span>';
    return '<span class="prof-pill">' + escHtml(p) + '</span>';
  };
  const flagPill = (flag, color) => {
    const c = color || FLAG_COLORS[flag] || '#8A8886';
    return '<span class="fc" style="background:' + c + '18;color:' + c + ';border:1px solid ' + c + '40">' + escHtml(flag) + '</span>';
  };
  const confPill = (conf) => {
    const labels = {confident:'Confident', caution:'Caution'};
    return '<span class="rs-conf-pill ' + (conf || 'confident') + '"><span class="dot"></span>' + (labels[conf]||conf||'Confident') + '</span>';
  };
  const riskChips = (risks) => (risks||[])
    .map(r => '<span class="rs-risk-chip ' + (r.severity==='severe'?'severe':'') + '">' + escHtml(r.label) + '</span>').join("");

  const detailHTML = (d) => {
    if (!d) return '';
    const indicators = (d.indicators || []).map(ind => {
      if (ind.active) return '<div class="rs-calc-line adjust"><div class="label">' + escHtml(ind.label) + '</div><div class="val">' + escHtml(ind.val || '+0 BD') + '</div></div>';
      return '<div class="rs-calc-line inactive"><div class="label">' + escHtml(ind.label) + '</div><div class="val">' + '—' + '</div></div>';
    }).join("");
    let maxLine = '';
    if (d.maxSlip != null) {
      maxLine = d.maxSlip > 0
        ? '<div class="rs-calc-line maxapp"><div>Max applied (not sum)</div><div class="val">+' + d.maxSlip + ' BD</div></div>'
        : '<div class="rs-calc-line maxapp"><div>No indicators firing</div><div class="val">+0 BD</div></div>';
    }
    const burnPct = (d.profileBurn != null) ? Math.round(d.profileBurn * 100) : null;
    const profSummary = (d.profileWindow != null)
      ? d.profileWindow + ' BD profile, ' + (d.profileElapsed != null ? d.profileElapsed : '?') + ' BD elapsed' + (burnPct!=null?' ('+burnPct+'% burned)':'')
      : 'Customer-controlled — no profile-burn math';
    return '<div class="rs-detail-inner"><div class="rs-detail-grid">'
      + '<div class="rs-detail-section"><h4>Inputs</h4>'
      + '<div class="rs-calc-line"><div>Profile / Burn</div><div class="val" style="font-size:11px">' + escHtml(profSummary) + '</div></div>'
      + '<div class="rs-calc-line"><div>Currently scheduled (QPC Due)</div><div class="val">' + escHtml(d.scheduled || '—') + '</div></div>'
      + '</div><div class="rs-detail-section"><h4>Risk indicators</h4>' + (indicators || '<div style="color:#8A8886;font-size:12px">No indicator data.</div>') + maxLine + '</div></div></div>';
  };

  const decideTodayCards = decideToday.map((j, i) => {
    const recPanel = j.recommendation === 'burn' ? 'left' : 'right';
    const bt = j.burnTarget || {};
    const co = j.commitOutcome || {};
    return '<div class="rs-urgent-card">'
      + '<div class="rs-urgent-hdr">'
      + '<span class="rs-urgent-deadline">DECIDE BY EOD TODAY</span>'
      + '<div><div style="display:flex;align-items:center;gap:10px"><span class="rs-urgent-wo">WO ' + escHtml(j.wo) + '</span><span class="rs-urgent-customer">' + escHtml(j.customer) + '</span></div>'
      + '<div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">' + profilePill(j.profile, j.profileCls==='tight') + flagPill(j.flag, j.flagColor) + '<span style="font-size:11px;color:#605E5C">· ' + escHtml(j.dept) + ' · Due ' + escHtml(j.dueDate) + ' (' + j.dueBD + ' BD)</span></div>'
      + '<div class="rs-risk-list">' + riskChips(j.risks) + '</div></div></div>'
      + '<div class="rs-urgent-body">'
      + '<div class="rs-urgent-option ' + (recPanel==='left'?'recommended':'') + '">'
      + (recPanel==='left'?'<span class="rs-urgent-option-tag rec">✓ Recommended</span>':'<span class="rs-urgent-option-tag alt">Option A</span>')
      + '<h4>Burn the reschedule</h4>'
      + '<div class="big">' + escHtml(bt.date || '—') + '</div>'
      + '<div class="small">' + escHtml(bt.band || '') + ' · ' + confPill(bt.confidence) + '</div>'
      + '<div class="small" style="margin-top:8px"><strong>Why:</strong> ' + escHtml(bt.reasoning || '') + '</div></div>'
      + '<div class="rs-urgent-option ' + (recPanel==='right'?'recommended':'') + '">'
      + (recPanel==='right'?'<span class="rs-urgent-option-tag rec">✓ Recommended</span>':'<span class="rs-urgent-option-tag alt">Option B</span>')
      + '<h4>Commit to current date</h4>'
      + '<div class="big bad">' + escHtml(co.miss || '—') + '</div>'
      + '<div class="small">Forecast still lands ' + escHtml(co.date || '—') + '</div>'
      + '<div class="small" style="margin-top:8px"><strong>Outcome:</strong> ' + escHtml(co.note || '') + '</div></div></div>'
      + '<div class="rs-urgent-foot"><span>Per Rule 2, reschedule must be made by EOD today.</span>'
      + '<a class="rs-show-math" onclick="rsToggleEl(\'rs-urgent-math-' + i + '\')">Show math →</a></div>'
      + '<div id="rs-urgent-math-' + i + '" style="display:none">' + detailHTML(j.detail) + '</div></div>';
  }).join("");

  const decideWeekRows = decideWeek.map((j, i) => {
    const t = j.target || {};
    return '<tr class="rs-expandable s' + (i%2) + '" onclick="rsToggleRow(this,\'rs-wk-' + i + '\')">'
      + '<td><span class="rs-row-toggle">+</span></td>'
      + '<td><span class="rs-action-pill burn">' + escHtml(j.actionLabel || 'Burn') + '</span></td>'
      + '<td><div class="rs-mini-wo">WO ' + escHtml(j.wo) + '</div>'
      + '<div class="rs-mini-cust">' + escHtml(j.customer) + '</div>'
      + '<div style="margin-top:4px">' + profilePill(j.profile, j.profileCls==='tight') + ' ' + flagPill(j.flag, j.flagColor) + '</div>'
      + '<div class="rs-risk-list">' + riskChips(j.risks) + '</div></td>'
      + '<td><div class="rs-deadline-cell"><div class="day">' + escHtml(j.deadlineDay || '—') + '</div>'
      + '<div class="bd ' + (j.deadlineBD!=null && j.deadlineBD<=1?'tight':'') + '">' + (j.deadlineBD != null ? j.deadlineBD : '—') + ' BD' + (j.deadlineNote?' · '+escHtml(j.deadlineNote):'') + '</div></div></td>'
      + '<td><div class="rs-target-cell"><div class="date">' + escHtml(t.date || '—') + '</div>'
      + '<div class="band">' + escHtml(t.band || '') + '</div>' + confPill(t.confidence) + '</div></td>'
      + '<td><div class="rs-tradeoff">' + escHtml(j.tradeoff || '') + '</div></td></tr>'
      + '<tr class="rs-detail-row" id="rs-wk-' + i + '" style="display:none"><td colspan="6">' + detailHTML(j.detail) + '</td></tr>';
  }).join("");

  const notifyRows = notify.map((j, i) => {
    const slipColor = (j.slipDays >= 5) ? '#A4262C' : '#7A6200';
    return '<tr class="rs-expandable s' + (i%2) + '" onclick="rsToggleRow(this,\'rs-nf-' + i + '\')">'
      + '<td><span class="rs-row-toggle">+</span></td>'
      + '<td><span class="rs-action-pill notify">Notify</span></td>'
      + '<td><div class="rs-mini-wo">WO ' + escHtml(j.wo) + '</div>'
      + '<div class="rs-mini-cust">' + escHtml(j.customer) + '</div>'
      + '<div style="margin-top:4px">' + profilePill(j.profile, j.profileCls==='tight') + ' ' + flagPill(j.flag, j.flagColor) + '</div>'
      + '<div class="rs-risk-list">' + riskChips(j.risks) + '</div></td>'
      + '<td><span class="mc" style="font-weight:700;color:' + slipColor + ';font-size:14px">' + escHtml(j.slip || '') + '</span></td>'
      + '<td><div class="rs-target-cell"><div class="date">' + escHtml(j.forecastDate || '—') + '</div>'
      + '<div class="band">scheduled: ' + escHtml(j.scheduledDue || '—') + '</div></div></td>'
      + '<td><div class="rs-tradeoff">' + escHtml(j.why || '') + '</div></td></tr>'
      + '<tr class="rs-detail-row" id="rs-nf-' + i + '" style="display:none"><td colspan="6">' + detailHTML(j.detail) + '</td></tr>';
  }).join("");

  const monitorRows = monitor.map((j, i) => {
    const deltaColor = j.delta === 'On time' ? '#0B6A0B' : '#7A6200';
    return '<tr class="rs-expandable s' + (i%2) + '" onclick="rsToggleRow(this,\'rs-mon-' + i + '\')">'
      + '<td><span class="rs-row-toggle">+</span></td>'
      + '<td><div class="rs-mini-wo">WO ' + escHtml(j.wo) + '</div>'
      + '<div class="rs-mini-cust">' + escHtml(j.customer) + '</div>'
      + '<div style="margin-top:4px">' + profilePill(j.profile, false) + '</div></td>'
      + '<td><span style="color:#605E5C;font-weight:600">' + escHtml(j.dept) + '</span></td>'
      + '<td><span class="mc" style="font-weight:700;color:#201F1E">' + escHtml(j.forecastDate || '—') + '</span></td>'
      + '<td><span class="mc" style="font-weight:700;color:' + deltaColor + '">' + escHtml(j.delta || '') + '</span></td>'
      + '<td><div style="font-size:11px;color:#605E5C">' + escHtml(j.note || '') + '</div></td></tr>'
      + '<tr class="rs-detail-row" id="rs-mon-' + i + '" style="display:none"><td colspan="6">' + detailHTML(j.detail) + '</td></tr>';
  }).join("");

  const escalateRows = escalate.map(j => '<div class="rs-esc-row">'
    + '<span class="rs-esc-badge">' + escHtml(j.badge || 'ESC') + '</span>'
    + '<div class="rs-esc-body"><div class="rs-esc-line1">'
    + '<span class="rs-action-pill escalate">Escalate</span>'
    + '<span class="rs-mini-wo">WO ' + escHtml(j.wo) + '</span>'
    + '<span class="rs-mini-cust">' + escHtml(j.customer) + '</span>'
    + profilePill(j.profile, false) + flagPill(j.flag, j.flagColor) + '</div>'
    + '<div class="rs-esc-reason"><strong>Reason:</strong> ' + escHtml(j.reason || '') + '</div>'
    + '<div class="rs-esc-action">→ ' + escHtml(j.action || '') + '</div></div></div>').join("");

  let html = '';

  if (reschedulePct >= 20) {
    html += '<div class="wb" style="background:#FDE7E9;border:1px solid #F1BBBC;color:#A4262C;border-left:4px solid #D13438;border-radius:10px;margin-bottom:12px;padding:11px 16px"><strong>House buffer at ' + reschedulePct + '% — past the 20% threshold.</strong> All suggested targets below are best-case. Any further slip becomes a customer miss.</div>';
  }

  html += '<div class="rs-ontime-hero ' + hero_state + '">'
    + '<div class="rs-ontime-fig"><span class="rs-ontime-num" style="color:' + hero_num_color + '">' + onTime + '</span>'
    + '<span class="rs-ontime-divider">/</span><span class="rs-ontime-denom">' + totalAssessed + '</span></div>'
    + '<div class="rs-ontime-meta">'
    + '<div class="rs-ontime-label" style="color:' + hero_num_color + '">Forecast on-time vs. current QPC Due</div>'
    + '<div class="rs-ontime-pct" style="color:' + hero_num_color + '">' + onTimePct + '%</div>'
    + '<div class="rs-ontime-context">' + heroContext + '</div></div>'
    + '<div style="display:flex;flex-direction:column;align-items:stretch;gap:4px;min-width:240px">'
    + '<div class="rs-target-band">'
    + '<div class="rs-target-band-zone" style="left:' + (target-2) + '%;right:0%"></div>'
    + '<div class="rs-target-zone-label">KPI ' + target + '%</div>'
    + '<div class="rs-target-band-marker" style="left:' + onTimePct + '%;background:' + marker_color + ';box-shadow:0 0 0 2px #fff,0 0 0 3px ' + marker_color + '"></div>'
    + '</div><div class="rs-target-band-labels"><span>0%</span><span>50%</span><span>100%</span></div></div></div>';

  html += '<div class="rs-buffer-strip"><div>'
    + '<div class="buf-label">House Buffer</div>'
    + '<div style="display:flex;align-items:baseline;gap:8px">'
    + '<span class="buf-pct" style="color:' + buf_color + '">' + reschedulePct + '%</span>'
    + '<span class="buf-detail">' + rescheduledCount + ' of ' + totalInHouse + ' burned · ' + monitor.length + ' tracking on-time, ' + notify.length + ' slipping vs QPC Due</span></div></div>'
    + '<div class="gb"><div class="gbf" style="width:' + (Math.min(reschedulePct,40)/40*100) + '%;background:' + buf_color + '"></div>'
    + '<div class="gm" style="left:50%;background:#D13438"></div></div></div>';

  html += '<div class="rs-exceptions">'
    + '<div class="rs-exceptions-title"><span>Today\'s exceptions · ' + exception_total + ' job' + (exception_total===1?'':'s') + ' needing attention</span>'
    + '<span class="right">Click any tile to jump to that section</span></div>'
    + '<div class="rs-tile-grid">'
    + '<a class="rs-tile b1" href="#rs-sec-today"><div class="tc-num">' + decideToday.length + '</div><div class="tc-lbl">Decide today</div><div class="tc-sub">Reschedule window closes EOD</div></a>'
    + '<a class="rs-tile b2" href="#rs-sec-week"><div class="tc-num">' + decideWeek.length + '</div><div class="tc-lbl">Decide this week</div><div class="tc-sub">Eligible to reschedule</div></a>'
    + '<a class="rs-tile b3" href="#rs-sec-notify"><div class="tc-num">' + notify.length + '</div><div class="tc-lbl">Notify customer</div><div class="tc-sub">Burned and forecast past QPC Due</div></a>'
    + '<a class="rs-tile b4" href="#rs-sec-monitor"><div class="tc-num">' + monitor.length + '</div><div class="tc-lbl">Monitor</div><div class="tc-sub">Burned but tracking on or before QPC Due</div></a>'
    + '<a class="rs-tile b5" href="#rs-sec-escalate"><div class="tc-num">' + escalate.length + '</div><div class="tc-lbl">Escalate</div><div class="tc-sub">Manual — needs an owner</div></a>'
    + '</div></div>';

  html += '<div class="rs-section" id="rs-sec-today">'
    + '<div class="rs-section-hdr s1"><span class="rs-section-dot s1"></span>'
    + '<div class="rs-section-title">Decide today</div>'
    + '<div class="rs-section-count">' + decideToday.length + '</div>'
    + '<div class="rs-section-sub">Rule 2: reschedule must be made ≥ 2 BD before due — window closes EOD</div></div>'
    + (decideToday.length === 0
        ? '<div class="rs-empty"><strong>No boundary cases today.</strong> All eligible jobs at the 2 BD boundary are forecast on-time, or have no risk indicators firing.</div>'
        : '<div>' + decideTodayCards + '</div>')
    + '</div>';

  html += '<div class="rs-section" id="rs-sec-week">'
    + '<div class="rs-section-hdr s2"><span class="rs-section-dot s2"></span>'
    + '<div class="rs-section-title">Decide this week</div>'
    + '<div class="rs-section-count">' + decideWeek.length + '</div>'
    + '<div class="rs-section-sub">Eligible to reschedule — deadline shown per row</div></div>'
    + (decideWeek.length === 0
        ? '<div class="rs-empty"><strong>No decisions queued for this week.</strong> All eligible jobs are forecast on-time vs. their current QPC Due.</div>'
        : '<div class="card"><table class="t"><thead><tr><th style="width:18px"></th><th>Action</th><th>WO / Customer</th><th>Decide By</th><th>Suggested Target</th><th>Trade-off</th></tr></thead><tbody>' + decideWeekRows + '</tbody></table></div>')
    + '</div>';

  html += '<div class="rs-section" id="rs-sec-notify">'
    + '<div class="rs-section-hdr s3"><span class="rs-section-dot s3"></span>'
    + '<div class="rs-section-title">Notify customer</div>'
    + '<div class="rs-section-count">' + notify.length + '</div>'
    + '<div class="rs-section-sub">Already burned — forecast lands past current QPC Due (any slip = OTD miss)</div></div>'
    + (notify.length === 0
        ? '<div class="rs-empty"><strong>No customer notifications recommended today.</strong> All burned jobs are forecast to land on or before their rescheduled QPC Due.</div>'
        : '<div class="card"><table class="t"><thead><tr><th style="width:18px"></th><th>Action</th><th>WO / Customer</th><th>Slip</th><th>Forecast Land</th><th>Why</th></tr></thead><tbody>' + notifyRows + '</tbody></table></div>')
    + '</div>';

  html += '<div class="rs-section" id="rs-sec-monitor">'
    + '<div class="rs-section-hdr s4"><span class="rs-section-dot s4"></span>'
    + '<div class="rs-section-title">Monitor</div>'
    + '<div class="rs-section-count">' + monitor.length + '</div>'
    + '<div class="rs-section-sub">Burned but tracking on or before current QPC Due — no action needed</div></div>'
    + (monitor.length === 0
        ? '<div class="rs-empty">No burned-but-tracking jobs.</div>'
        : '<div id="rs-mon-toggle" class="rs-collapse-toggle" onclick="rsToggleMonitor()"><span class="chev">▶</span><span class="ct-text">Show ' + monitor.length + ' burned-but-tracking job' + (monitor.length===1?'':'s') + '</span></div>'
          + '<div id="rs-mon-panel" style="display:none;margin-top:10px"><div class="card"><table class="t"><thead><tr><th style="width:18px"></th><th>WO / Customer</th><th>Dept</th><th>Forecast</th><th>vs. Scheduled</th><th>Note</th></tr></thead><tbody>' + monitorRows + '</tbody></table></div></div>')
    + '</div>';

  html += '<div class="rs-section" id="rs-sec-escalate">'
    + '<div class="rs-section-hdr s5"><span class="rs-section-dot s5"></span>'
    + '<div class="rs-section-title">Escalate</div>'
    + '<div class="rs-section-count">' + escalate.length + '</div>'
    + '<div class="rs-section-sub">No auto-suggest — each needs a named owner</div></div>'
    + (escalate.length === 0
        ? '<div class="rs-empty">No items requiring escalation.</div>'
        : '<div class="rs-esc-list">' + escalateRows + '</div>')
    + '</div>';

  html += '<div class="rs-explainer">'
    + '<div id="rs-expl-toggle" class="rs-explainer-toggle" onclick="rsToggleExplainer()"><span class="chev">▶</span><span style="font-size:12px;font-weight:700;color:#605E5C">How recommendations are generated · QPC reschedule rules · arithmetic</span></div>'
    + '<div id="rs-expl-content" class="rs-explainer-content">'
    + '<h3>OTD-strict (98% KPI) framing</h3>'
    + '<p>The 98% OTD KPI is measured against the <strong>current QPC Due Date</strong>, which moves when a reschedule is burned. Burning a reschedule is the tool that protects OTD: move the internal commitment to a date you can hit, then measure against that.</p>'
    + '<h3>Default-to-scheduled, slip-on-indicator</h3>'
    + '<p>Forecast = current QPC Due Date by default. Slip is added only when specific risk indicators fire. Multiple indicators take the <strong>maximum</strong>, not the sum.</p>'
    + '</div></div>';

  html += '<div class="biz-note">All times Pacific. Mon–Fri biz days, 7:00a–3:30p.</div>';

  return html;
}

// ─── Toggle helpers (Reschedule Status v12) ───
function rsToggleRow(tr, id) {
  const detail = document.getElementById(id);
  if (!detail) return;
  const open = detail.style.display === 'table-row';
  detail.style.display = open ? 'none' : 'table-row';
  if (tr) tr.classList.toggle('open', !open);
}
function rsToggleEl(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}
function rsToggleMonitor() {
  const t = document.getElementById('rs-mon-toggle');
  const p = document.getElementById('rs-mon-panel');
  if (!t || !p) return;
  const open = p.style.display === 'block';
  p.style.display = open ? 'none' : 'block';
  t.classList.toggle('open', !open);
}
function rsToggleExplainer() {
  const t = document.getElementById('rs-expl-toggle');
  const c = document.getElementById('rs-expl-content');
  if (!t || !c) return;
  c.classList.toggle('open');
  t.classList.toggle('open');
}

// ─── TAB 4: PROFILE WATCH (v9 new) ───
function buildProfileWatch() {
  // Short-scheduled list
  const ss = DATA.shortScheduledJobs || [];
  const ssRows = ss.map((j, i) => {
    const agingBadge = j.isAging
      ? `<span style="color:#D13438;font-weight:700;font-size:10px">AGING</span>`
      : `<span style="color:#8A8886;font-size:10px">not yet aging</span>`;
    const tightCls = TIGHT_PROFILES.has(j.profile) ? 'style="background:#FDE7E9;color:#A4262C;border-color:#F1BBBC"' : '';
    return `<tr class="${i%2===0?'s0':'s1'}">
      <td class="mc" style="font-weight:700;color:#201F1E;border-left:3px solid #CA5010;padding-left:12px">${esc(j.wo)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#323130">${esc(j.customer)}</td>
      <td style="color:#605E5C;font-weight:600">${esc(j.dept)}</td>
      <td><span class="prof-pill" ${tightCls}>${esc(j.profile)}</span></td>
      <td class="r mc" style="color:#605E5C">${j.profileMin}\u2013${j.profileMax}d</td>
      <td class="r mc" style="color:#D13438;font-weight:700">${j.scheduledLeadBD}d</td>
      <td class="r mc" style="color:#D13438;font-weight:700">\u2212${j.shortfall}d</td>
      <td class="r mc" style="color:#605E5C">${esc(j.dueDate)}</td>
      <td>${agingBadge}</td>
    </tr>`;
  }).join("");

  // Unclassified aging WOs
  const uncList = (DATA.unclassifiedAgingWOs || []);
  const uncChips = uncList.map(w =>
    `<span style="display:inline-block;font-family:'Source Code Pro',monospace;font-size:11px;padding:3px 8px;border-radius:6px;background:#FFF4CE;color:#7A6200;border:1px solid #F7D98B;margin:2px">${esc(w)}</span>`
  ).join(" ");

  // Customer-controlled profile jobs
  const cpJobs = DATA.customerProfileJobs || [];
  const cpRows = cpJobs.map((j, i) =>
    `<tr class="${i%2===0?'s0':'s1'}">
      <td class="mc" style="font-weight:700;color:#201F1E;border-left:3px solid #8764B8;padding-left:12px">${esc(j.wo)}</td>
      <td style="color:#323130">${esc(j.customer)}</td>
      <td><span class="prof-pill prov">${esc(j.profile)}</span></td>
      <td style="color:#605E5C">${esc(j.locationDept)}</td>
      <td class="r mc" style="color:#605E5C">${esc(j.dueDate)} <span style="font-size:10px;color:#8764B8;font-weight:700">provisional</span></td>
    </tr>`
  ).join("");

  // Profile distribution
  const dist = DATA.overall.profileDistribution || [];
  const maxCount = Math.max(...dist.map(d => d.count), 1);
  const distRows = dist.map((d, i) => {
    const cls = TIGHT_PROFILES.has(d.name) ? "#A4262C" : LONG_PROFILES.has(d.name) ? "#0B6A0B" : (d.name==="(Unclassified)"?"#7A6200":"#605E5C");
    const barColor = TIGHT_PROFILES.has(d.name) ? "#D13438" : LONG_PROFILES.has(d.name) ? "#107C10" : (d.name==="(Unclassified)"?"#C19C00":"#8A8886");
    const w = Math.round(100 * d.count / maxCount);
    return `<tr class="${i%2===0?'s0':'s1'}">
      <td style="color:${cls};font-weight:600;padding-left:16px">${esc(d.name)}</td>
      <td class="r mc" style="color:#323130;font-weight:700">${d.count}</td>
      <td><div class="db"><div class="dbf" style="width:${w}%;background:${barColor}"></div></div></td>
    </tr>`;
  }).join("");

  return `
    <div class="ru">
      <h3>Profile Watch — What this tab is for</h3>
      <p>Three profile-driven views of structural risk: jobs scheduled tighter than their profile minimum (a planning-quality signal), aging jobs with no profile assigned (a data-quality gap Taylor should close), and Customer-Hold-by-profile work (Source Required / DCMA, provisional dates). House-wide profile mix is shown at the bottom for context.</p>
    </div>

    <div class="st">Short-Scheduled Jobs (${ss.length})</div>
    <div style="background:#FFF4CE;border:1px solid #F7D98B;color:#7A6200;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;line-height:1.55;">
      These are in-house jobs whose <strong>Received \u2192 QPC Due Date</strong> is tighter than the profile's minimum window. They were likely doomed at intake — production timing can't recover the planning gap. Fix at the scheduling stage.
    </div>
    <div class="card sw">
      ${ss.length ? `<table class="t"><thead><tr>
        <th>WO</th><th>Customer</th><th>Dept</th><th>Profile</th><th class="r">Expected</th><th class="r">Scheduled</th><th class="r">Short By</th><th class="r">Due</th><th>Status</th>
      </tr></thead><tbody>${ssRows}</tbody></table>`
      : `<div style="padding:24px;text-align:center;color:#8A8886;font-size:13px">No short-scheduled jobs detected. All classified in-house jobs have a Received\u2192Due window consistent with their profile.</div>`}
    </div>

    <div class="st" style="margin-top:20px">Unclassified Aging Jobs (${uncList.length})</div>
    <div style="background:#FFF4CE;border:1px solid #F7D98B;color:#7A6200;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;line-height:1.55;">
      These aging WOs have <strong>no Job Profile</strong> assigned. They still carry milestone/due flags, but profile-burn and short-scheduled checks can't run on them. Primary owner: scheduler. Backup: receiving/inspection for obvious physical categories.
    </div>
    <div class="card" style="padding:14px 16px">
      ${uncList.length ? uncChips : `<div style="color:#8A8886;font-size:13px">None — every aging job is classified. Nice.</div>`}
    </div>

    <div class="st" style="margin-top:20px">Customer Hold by Profile (${cpJobs.length})</div>
    <div style="background:#F0E6FA;border:1px solid #E0D0F0;color:#8764B8;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;line-height:1.55;">
      Source Required and DCMA profile jobs. Their due dates are <strong>provisional targets</strong> — outside scheduling (source inspection, DCMA witness) controls the actual release. Excluded from in-house AR math; no OT recommendations apply.
    </div>
    <div class="card sw">
      ${cpJobs.length ? `<table class="t"><thead><tr>
        <th>WO</th><th>Customer</th><th>Profile</th><th>Current Location</th><th class="r">Target Date</th>
      </tr></thead><tbody>${cpRows}</tbody></table>`
      : `<div style="padding:24px;text-align:center;color:#8A8886;font-size:13px">No Customer-Hold-by-profile jobs currently in house.</div>`}
    </div>

    <div class="st" style="margin-top:20px">House-Wide Profile Mix (in-house only, excludes MRB + Customer Hold)</div>
    <div class="card sw">
      <table class="t"><thead><tr><th>Profile</th><th class="r">Count</th><th>Share</th></tr></thead>
      <tbody>${distRows}</tbody></table>
    </div>
  `;
}

               source: () => (DATA.allAgingJobs||[]).filter(j => j.isUnclassified), variant: 'aging' },
  short:     { title: "Short-Scheduled Jobs",
               subtitle: () => `In-house jobs scheduled tighter than their profile minimum`,
               source: () => DATA.shortScheduledJobs || [], variant: 'short' },
  custHold:  { title: "Customer Hold (Profile) Jobs",
               subtitle: () => `Source Required / DCMA jobs — provisional targets (out of in-house AR)`,
               source: () => DATA.customerProfileJobs || [], variant: 'custHold' },
  completed: { title: "Completed at Op — Awaiting Handoff",
               subtitle: () => `Progress = 03 - Complete but still at their op — workflow bottleneck signal`,
               source: () => DATA.completedJobs || [], variant: 'completed' },
  tier3:     { title: "Tier Expedites (T1/T2/T3)",
               subtitle: () => {
                 const dist = DATA.overall.expediteTierDistribution || [];
                 if (!dist.length) return 'No tiered expedites in data yet';
                 return dist.map(t => `${t.tier.replace('Tier ','T').replace(' Expedite','')}: ${t.count}`).join(' · ');
               },
               source: () => (DATA.allInHouseJobs||[]).filter(j => j.expediteTier != null), variant: 'inhouse' },
};

let modalState = { kpi: null, deptFilter: 'All' };

// Sort jobs by soonest QPC Due Date first (null dates pushed to the end).
// dueBD is the canonical ordering key (biz days to QPC Due Date); it's monotonic
// with the actual calendar date on Mon-Fri.
function sortByDueDate(jobs) {
  return jobs.slice().sort((a, b) => {
    const ab = a.dueBD, bb = b.dueBD;
    if (ab == null && bb == null) return 0;
    if (ab == null) return 1;   // "No Date" -> end
    if (bb == null) return -1;
    return ab - bb;
  });
}

function _deptOf(j) { return j.dept || j.locationDept || ''; }

function openKpiModal(kpi) {
  if (!KPI_CONFIGS[kpi]) return;
  modalState = { kpi, deptFilter: 'All' };
  renderModal();
  const el = document.getElementById('kpi-modal');
  el.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeKpiModal() {
  const el = document.getElementById('kpi-modal');
  el.classList.remove('open');
  el.innerHTML = '';
  document.body.style.overflow = '';
  modalState = { kpi: null, deptFilter: 'All' };
}

function setModalDeptFilter(d) {
  modalState.deptFilter = d;
  renderModal();
}

function renderModal() {
  const { kpi, deptFilter } = modalState;
  const cfg = KPI_CONFIGS[kpi];
  if (!cfg) return;
  const full = cfg.source();
  const allDepts = Array.from(new Set(full.map(_deptOf).filter(Boolean))).sort();
  let jobs = full;
  if (deptFilter !== 'All') jobs = jobs.filter(j => _deptOf(j) === deptFilter);
  jobs = sortByDueDate(jobs);

  const deptCtrl = (allDepts.length > 1)
    ? `<span class="modal-ctrl-label">Filter Dept</span>
       <select class="modal-ctrl-sel" onchange="setModalDeptFilter(this.value)" aria-label="Filter by department">
         <option value="All">All Departments (${full.length})</option>
         ${allDepts.map(d => {
           const ct = full.filter(j => _deptOf(j) === d).length;
           return `<option value="${esc(d)}"${deptFilter===d?' selected':''}>${esc(d)} (${ct})</option>`;
         }).join('')}
       </select>`
    : `<span class="modal-ctrl-label">Dept</span><span style="font-size:12px;color:#605E5C;font-weight:600">${allDepts[0] || '—'}</span>`;

  const body = jobs.length
    ? buildModalTable(jobs, cfg.variant)
    : `<div class="modal-empty">No jobs match this filter.</div>`;

  const subtitle = cfg.subtitle ? cfg.subtitle() : '';

  document.getElementById('kpi-modal').innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-hdr">
        <div>
          <div class="modal-title" id="kpi-modal-title">${esc(cfg.title)}</div>
          ${subtitle ? `<div style="font-size:11px;color:#8A8886;margin-top:2px">${esc(subtitle)}</div>` : ''}
        </div>
        <div class="modal-count">${jobs.length}${jobs.length !== full.length ? ' / ' + full.length : ''}</div>
        <button class="modal-close" onclick="closeKpiModal()" title="Close (Esc)" aria-label="Close">✕</button>
      </div>
      <div class="modal-controls">${deptCtrl}
        <span class="modal-ctrl-label" style="margin-left:auto">Sorted by earliest QPC Due Date</span>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-foot">
        <span>Click outside, tap ✕, or press Esc to close.</span>
        <span>v11 — Drill-down powered by live extraction data.</span>
      </div>
    </div>`;
}

// Build an HTML table of jobs. Column set varies by variant, but the core
// columns (Due, WO, Customer, Dept, Profile, Priority, Status) are consistent.
function buildModalTable(jobs, variant) {
  // Column spec per variant. Each spec is a list of {h: header, c: (job)=>html}.
  const col = {
    due:     { h: 'Due',      c: (j) => {
                 const bd = j.dueBD;
                 const c = bd != null && bd < 0 ? '#D13438' : bd != null && bd <= 2 ? '#CA5010' : '#605E5C';
                 const bdTxt = bd != null ? ` <span style="color:${c};font-size:10px;font-weight:700">(${bd}d)</span>` : '';
                 return `<span class="mc" style="color:#605E5C">${esc(j.dueDate || '—')}${bdTxt}</span>`;
              }},
    wo:      { h: 'WO',       c: (j) => `<span class="mc" style="font-weight:700;color:#201F1E">${esc(j.wo)}</span>` },
    cust:    { h: 'Customer', c: (j) => `<span style="max-width:180px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#323130;vertical-align:middle">${esc(j.customer || '—')}</span>` },
    dept:    { h: 'Dept',     c: (j) => `<span style="color:#323130;font-weight:600;font-size:11.5px">${esc(_deptOf(j))}</span>` },
    profile: { h: 'Profile',  c: (j) => profilePill(j) },
    prio:    { h: 'Priority', c: (j) => j.priority ? `<span style="${prioStyle(j.priority)}">${esc(j.priority)}</span>` : '<span class="status-none">—</span>' },
    flag:    { h: 'Flag',     c: (j) => {
                 if (!j.flag) return '<span class="status-none">—</span>';
                 return `<span class="status-pill" style="background:${FLAG_COLORS[j.flag]}18;color:${FLAG_COLORS[j.flag]};border:1px solid ${FLAG_COLORS[j.flag]}40">${esc(j.flag)}</span>`;
              }},
    resched: { h: 'Resched',  c: (j) => j.rescheduled ? '<span style="color:#D13438;font-weight:700;font-size:10px">BURNED</span>' : '<span class="status-none">—</span>' },
    status:  { h: 'Status',   c: (j) => buildStatusCell(j, variant) },
    startBy: { h: 'Start By', c: (j) => {
                 const bd = j.msBD;
                 const lbl = bd == null ? '—' : bd <= 0 ? 'START NOW' : bd === 1 ? 'TOMORROW' : `${bd}d`;
                 const c = bd != null && bd <= 0 ? '#D13438' : bd === 1 ? '#CA5010' : '#0078D4';
                 return `<span class="mc" style="color:${c}">${esc(j.msDate || '—')} <span style="font-size:9px;font-weight:700">${lbl}</span></span>`;
              }},
    aging:   { h: 'Aging?',   c: (j) => j.isAging
                 ? '<span class="status-pill status-aging">AGING</span>'
                 : '<span class="status-none">no</span>' },
    short:   { h: 'Short By', c: (j) => `<span class="mc" style="color:#D13438;font-weight:700">−${j.shortfall}d</span> <span style="font-size:10px;color:#8A8886">(window ${j.profileMin}–${j.profileMax}d, lead ${j.scheduledLeadBD}d)</span>` },
    location:{ h: 'Location', c: (j) => `<span style="color:#605E5C;font-size:11.5px">${esc(j.locationDept || '—')}</span>` },
  };

  let cols;
  if (variant === 'aging') {
    cols = ['due','wo','cust','dept','profile','prio','flag','resched'];
  } else if (variant === 'inhouse') {
    cols = ['due','wo','cust','dept','profile','prio','status'];
  } else if (variant === 'upcoming') {
    cols = ['due','wo','dept','profile','startBy','prio'];
  } else if (variant === 'mrb') {
    cols = ['due','wo','cust','location','profile','prio'];
  } else if (variant === 'short') {
    cols = ['due','wo','cust','dept','profile','short','prio','aging'];
  } else if (variant === 'custHold') {
    cols = ['due','wo','cust','location','profile','prio'];
  } else if (variant === 'completed') {
    cols = ['due','wo','cust','dept','profile','prio','status'];
  } else {
    cols = ['due','wo','cust','dept','profile','prio'];
  }

  const thead = cols.map(k => `<th${(k==='due'||k==='short'||k==='startBy')?' class="r"':''}>${col[k].h}</th>`).join('');
  const rows = jobs.map((j, i) => {
    const tds = cols.map(k => `<td${(k==='due'||k==='short'||k==='startBy')?' class="r"':''}>${col[k].c(j)}</td>`).join('');
    return `<tr class="${i%2===0?'s0':'s1'}">${tds}</tr>`;
  }).join('');
  return `<table class="t"><thead><tr>${thead}</tr></thead><tbody>${rows}</tbody></table>`;
}

// Compose a status/context cell per variant (used by `status` column).
function buildStatusCell(j, variant) {
  if (variant === 'inhouse') {
    const bits = [];
    if (j.isAging && j.agingFlag) bits.push(`<span class="status-pill" style="background:${FLAG_COLORS[j.agingFlag]}18;color:${FLAG_COLORS[j.agingFlag]};border:1px solid ${FLAG_COLORS[j.agingFlag]}40">${esc(j.agingFlag)}</span>`);
    else if (j.isAging) bits.push('<span class="status-pill status-aging">AGING</span>');
    if (j.isCompleted) bits.push('<span class="status-pill status-complete">03 - Complete</span>');
    if (j.expediteTier) bits.push(`<span class="tier-badge">${j.expediteTier.replace('Tier ','T').replace(' Expedite','')}</span>`);
    if (!bits.length) bits.push('<span class="status-none">in flow</span>');
    return bits.join(' ');
  }
  if (variant === 'completed') {
    return `<span class="status-pill status-complete">03 - Complete</span> <span style="color:#8A8886;font-size:10px">at ${esc(j.locationDept || '—')}</span>`;
  }
  return '<span class="status-none">—</span>';
}

// ─── INIT ───
document.getElementById("header").innerHTML = buildHeader();
document.getElementById("dq-row").innerHTML = buildDqRow();
document.getElementById("legend-area").innerHTML = buildLegend();
document.getElementById("tab0").innerHTML = buildDeptSignals();
document.getElementById("tab1").innerHTML = buildProductionFlow();
document.getElementById("tab2").innerHTML = buildJobFlags();
document.getElementById("tab3").innerHTML = buildReschedule();
document.getElementById("tab4").innerHTML = buildProfileWatch();

// v11: backdrop click + Esc close
document.getElementById('kpi-modal').addEventListener('click', (e) => {
  if (e.target.id === 'kpi-modal') closeKpiModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('kpi-modal').classList.contains('open')) {
    closeKpiModal();
  }
});
</script>
